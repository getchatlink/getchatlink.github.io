    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Links de WhatsApp y QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ece5dd; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; margin-top: 30px; }
        h2 { text-align: center; color: #075e54; margin-top: 0; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        
        label { display: block; margin-top: 15px; color: #333; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { resize: vertical; height: 80px; }
        
        button.btn-generate { width: 100%; padding: 15px; background-color: #25d366; color: white; border: none; border-radius: 8px; margin-top: 25px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button.btn-generate:hover { background-color: #128c7e; }
        
        /* Caja de Resultados */
        .result-box { margin-top: 25px; padding: 20px; background-color: #f9f9f9; border-radius: 10px; border: 2px dashed #25d366; display: none; text-align: center; }
        .link-output { word-break: break-all; background: #e1f5fe; padding: 10px; border-radius: 5px; color: #0056b3; font-size: 14px; margin-bottom: 15px; }
        
        button.btn-copy { padding: 10px 15px; background-color: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button.btn-copy:hover { background-color: #054c44; }
        
        #qrcode { margin-top: 20px; display: flex; justify-content: center; padding: 10px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Creador de Links 💬</h2>
    <p class="subtitle">Generá tu enlace personalizado y código QR gratis.</p>
    
    <label for="phone">Número de WhatsApp (con código de país):</label>
    <input type="number" id="phone" placeholder="Ej: 5493811234567" required>
    <small style="color: #888; font-size: 12px;">Sin símbolos (+), espacios ni guiones.</small>

    <label for="message">Mensaje predeterminado (Opcional):</label>
    <textarea id="message" placeholder="Ej: ¡Hola! Me interesa comprar tu producto..."></textarea>

    <button class="btn-generate" onclick="generateLink()">Generar Link y QR</button>

    <div class="result-box" id="resultBox">
        <h3 style="color: #333; margin-top: 0; font-size: 16px;">¡Tu enlace está listo!</h3>
        <div class="link-output" id="generatedLink"></div>
        <button class="btn-copy" onclick="copyLink()">Copiar Enlace</button>
        
        <div style="margin-top: 20px; font-size: 14px; color: #555; font-weight: bold;">Tu Código QR:</div>
        <div id="qrcode"></div>
        <small style="color: #888; font-size: 12px; display: block; margin-top: 10px;">Mantén presionado el QR (o clic derecho) para guardarlo.</small>
    </div>
</div>

<script>
    function generateLink() {
        // 1. Obtenemos los valores ingresados
        let phone = document.getElementById('phone').value.trim();
        let message = document.getElementById('message').value.trim();
        
        if (!phone) {
            alert("Por favor, ingresa un número de teléfono válido.");
            return;
        }

        // 2. Limpiamos el número por si el usuario puso espacios o signos raros
        phone = phone.replace(/[^0-9]/g, '');

        // 3. Codificamos el texto para que la URL lo entienda (ej: cambia los espacios por %20)
        let encodedMessage = encodeURIComponent(message);
        
        // 4. Armamos la URL final
        let finalUrl = `https://wa.me/${phone}`;
        if (encodedMessage) {
            finalUrl += `?text=${encodedMessage}`;
        }

        // 5. Mostramos el link en la pantalla
        document.getElementById('generatedLink').innerText = finalUrl;
        document.getElementById('resultBox').style.display = "block";

        // 6. Generamos el Código QR
        let qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = ""; // Limpiamos el QR anterior si el usuario genera otro
        new QRCode(qrContainer, {
            text: finalUrl,
            width: 150,
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function copyLink() {
        let textToCopy = document.getElementById('generatedLink').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("¡Enlace copiado al portapapeles!");
        });
    }
</script>

</body>
</html>
